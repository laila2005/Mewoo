<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Profile | PetPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="../css/index.css" rel="stylesheet">
    <style>
        .ambient-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col">
    <!-- Navbar (Simplified) -->
    <nav class="bg-white/80 backdrop-blur-xl border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='user.html'">
                    <img src="../assets/images/logoo.png" alt="PetPulse Logo" class="h-10 w-10 object-contain" />
                    <span class="text-2xl font-extrabold tracking-tight text-primary">PetPulse</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        <!-- Breadcrumb -->
        <div class="flex items-center gap-2 text-sm text-slate-500 mb-8 cursor-pointer hover:text-primary transition-colors w-fit" onclick="window.history.back()">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Back to Adoption
        </div>

        <div class="bg-white rounded-3xl ambient-shadow overflow-hidden flex flex-col md:flex-row">
            <!-- Pet Image -->
            <div class="md:w-1/2 h-80 md:h-auto relative">
                <img id="petImg" class="w-full h-full object-cover" src="" alt="Pet Image">
                <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-4 py-2 rounded-full text-xs font-bold shadow-sm" id="petSpeciesTag"></div>
            </div>
            
            <!-- Pet Details -->
            <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-between">
                <div>
                    <h1 id="petName" class="text-4xl font-extrabold text-slate-900 mb-2"></h1>
                    <p id="petBreedAge" class="text-slate-500 text-lg mb-6"></p>
                    
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                            <span class="material-symbols-outlined text-primary mb-2">pets</span>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Personality</p>
                            <p id="petPersonality" class="font-semibold text-slate-800"></p>
                        </div>
                        <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                            <span class="material-symbols-outlined text-secondary mb-2">monitor_weight</span>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Weight</p>
                            <p id="petWeight" class="font-semibold text-slate-800"></p>
                        </div>
                    </div>

                    <h3 class="text-xl font-bold text-slate-900 mb-3">About me</h3>
                    <p id="petBio" class="text-slate-600 leading-relaxed"></p>
                </div>

                <div class="mt-10">
                    <button class="w-full bg-primary text-on-primary py-4 px-6 rounded-2xl font-bold text-lg hover:bg-primary-container hover:-translate-y-1 transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">volunteer_activism</span>
                        Adopt <span id="btnPetName"></span>
                    </button>
                    <p class="text-center text-xs text-slate-400 mt-4">Adoption process is managed securely by PetPulse.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-50 border-t border-slate-200 w-full mt-auto py-8 sm:py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8 border-t border-slate-200 text-center">
            <p class="text-slate-500 text-sm">© 2026 PetPulse. Compassionate Care for Every Companion.</p>
        </div>
    </footer>

    <script>
        const petsData = {
            milo: {
                name: 'Milo',
                species: 'DOG',
                speciesColor: 'text-primary',
                breedAge: 'Golden Retriever Mix • 2 Years',
                personality: 'Calm & Loving',
                weight: '15 kg',
                bio: 'Milo is a sweet and gentle soul looking for a forever home. He loves quiet evenings on the couch and is very good with children. He is fully house-trained and ready to be your best friend.',
                img: 'https://lh3.googleusercontent.com/aida-public/AB6AXuBIYDqvNenCMOIcovCc3-8JiqPFIFVMge8QT3kBMGgY00RFtQZz36_5xeoOW6u0MeSzrPwrScDyyg5-PmQsx0vDvS33gAEL7AofIxjdu2mkHYU3JR6laFwWrOF-E9R5GDlnQPOBWNtOfKufF4lhgc4Dwztk2BpH4JSL_NInA1FCEUwfhpqx9AKWHdhOoGlYnSN3rtBpm1mrdIVYyiV4T5xAXLW--qQXHJOKiNqx3S0y0vDyaF70Yd0s8d8OeXirjFs5OhSGas3ruxiK'
            },
            luna: {
                name: 'Luna',
                species: 'CAT',
                speciesColor: 'text-secondary',
                breedAge: 'Tuxedo Cat • 6 Months',
                personality: 'Energetic & Playful',
                weight: '3.2 kg',
                bio: 'Luna is a bundle of joy! She loves chasing laser pointers and playing with feather wands. When shes finally tired out, shell curl right up in your lap and purr herself to sleep. A perfect companion for an active household.',
                img: 'https://lh3.googleusercontent.com/aida-public/AB6AXuA1HTaaBQPg3n_nYf7w6etlvKrVwf6dxEoFOZAPH95jlQc0X8myrLHYV0YL5Tjo0PUsuMLUWa_wz6B-FWk6aw_x0e2Y7Gt3afAJ-B-ZQbm9wvnJhqYFndgXfVSblSmxeC_6YPpgL9xIOClSCE8MnmBWbd-JVD25BfeKNsA2ALnh4F-E4L3LurtCfYQ7drMMb8AFlDhQhAgC_K1MwBGFKPVHsC4M8MgOQETv_vWP2OkI26iXeggtM98IefRiHj22amdfkyzpMNZEBBXd'
            }
        };

        const params = new URLSearchParams(window.location.search);
        const petId = params.get('pet') || 'milo';
        const pet = petsData[petId] || petsData['milo'];

        document.getElementById('petName').textContent = pet.name;
        document.getElementById('btnPetName').textContent = pet.name;
        document.getElementById('petBreedAge').textContent = pet.breedAge;
        document.getElementById('petPersonality').textContent = pet.personality;
        document.getElementById('petWeight').textContent = pet.weight;
        document.getElementById('petBio').textContent = pet.bio;
        document.getElementById('petImg').src = pet.img;
        
        const speciesTag = document.getElementById('petSpeciesTag');
        speciesTag.textContent = pet.species;
        speciesTag.className = `absolute top-4 right-4 bg-white/90 backdrop-blur px-4 py-2 rounded-full text-xs font-bold shadow-sm ${pet.speciesColor}`;
        
        document.title = `${pet.name} | PetPulse Adoption`;
    </script>
</body>
</html>
