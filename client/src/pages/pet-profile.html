<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Profile | PetPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="../css/index.css" rel="stylesheet">
    <style>
        .ambient-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col">
    <!-- Navbar (Simplified) -->
    <nav class="bg-white/80 backdrop-blur-xl border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='user.html'">
                    <img src="../assets/images/logoo.png" alt="PetPulse Logo" class="h-10 w-10 object-contain" />
                    <span class="text-2xl font-extrabold tracking-tight text-primary">PetPulse</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        <!-- Breadcrumb -->
        <div class="flex items-center gap-2 text-sm text-slate-500 mb-8 cursor-pointer hover:text-primary transition-colors w-fit" onclick="window.history.back()">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Back to Adoption
        </div>

        <div class="bg-white rounded-3xl ambient-shadow overflow-hidden flex flex-col md:flex-row">
            <!-- Pet Image -->
            <div class="md:w-1/2 h-80 md:h-auto relative">
                <img id="petImg" class="w-full h-full object-cover" src="" alt="Pet Image">
                <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-4 py-2 rounded-full text-xs font-bold shadow-sm" id="petSpeciesTag"></div>
            </div>
            
            <!-- Pet Details -->
            <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-between">
                <div>
                    <h1 id="petName" class="text-4xl font-extrabold text-slate-900 mb-2"></h1>
                    <p id="petBreedAge" class="text-slate-500 text-lg mb-6"></p>
                    
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                            <span class="material-symbols-outlined text-primary mb-2">pets</span>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Species</p>
                            <p id="petPersonality" class="font-semibold text-slate-800"></p>
                        </div>
                        <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                            <span class="material-symbols-outlined text-secondary mb-2">monitor_weight</span>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Weight</p>
                            <p id="petWeight" class="font-semibold text-slate-800"></p>
                        </div>
                    </div>

                    <h3 class="text-xl font-bold text-slate-900 mb-3">About me</h3>
                    <p id="petBio" class="text-slate-600 leading-relaxed"></p>
                </div>

                <div class="mt-8 border-t border-slate-100 pt-8">
                    <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">Meet the Owner</h3>
                    <div class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div class="flex items-center gap-4">
                            <div id="ownerAvatar" class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xl"></div>
                            <div>
                                <p id="ownerName" class="font-bold text-slate-900"></p>
                                <p class="text-xs text-slate-500">PetPulse Member</p>
                            </div>
                        </div>
                        <button id="chatRequestBtn" class="bg-white border border-slate-200 hover:border-primary text-primary px-4 py-2 rounded-xl text-sm font-bold shadow-sm transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined text-[18px]">chat</span>
                            Message
                        </button>
                    </div>
                </div>

                <div class="mt-8">
                    <button id="adoptBtn" class="w-full bg-primary text-on-primary py-4 px-6 rounded-2xl font-bold text-lg hover:bg-primary-container hover:-translate-y-1 transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">volunteer_activism</span>
                        Adopt <span id="btnPetName"></span>
                    </button>
                    <p class="text-center text-xs text-slate-400 mt-4">Adoption process is managed securely by PetPulse.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-50 border-t border-slate-200 w-full mt-auto py-8 sm:py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8 border-t border-slate-200 text-center">
            <p class="text-slate-500 text-sm">© 2026 PetPulse. Compassionate Care for Every Companion.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <script>
        const API_BASE = window.location.origin.includes('localhost') ? 'http://localhost:5000/api' : '/api';
        const token = localStorage.getItem('token');
        let currentOwnerId = null;
        let currentPetId = null;

        function showToast(msg, type='success') {
            Toastify({ text: msg, duration: 3000, style: { background: type==='error'?'#ba1a1a':'#005da7' } }).showToast();
        }

        async function loadPetData() {
            const params = new URLSearchParams(window.location.search);
            const petId = params.get('id') || params.get('pet');
            
            if (!petId) {
                document.getElementById('petName').textContent = "Pet Not Found";
                document.getElementById('petBio').textContent = "Please provide a valid pet ID.";
                return;
            }

            const mockPets = {
                'milo': { id: 'mock_milo', name: 'Milo', breed: 'Mixed', age_years: 2, species: 'Dog', weight_kg: 12, bio: 'Calm & Loving puppy. Very playful and loves treats.', avatar_url: 'https://lh3.googleusercontent.com/aida-public/AB6AXuBIYDqvNenCMOIcovCc3-8JiqPFIFVMge8QT3kBMGgY00RFtQZz36_5xeoOW6u0MeSzrPwrScDyyg5-PmQsx0vDvS33gAEL7AofIxjdu2mkHYU3JR6laFwWrOF-E9R5GDlnQPOBWNtOfKufF4lhgc4Dwztk2BpH4JSL_NInA1FCEUwfhpqx9AKWHdhOoGlYnSN3rtBpm1mrdIVYyiV4T5xAXLW--qQXHJOKiNqx3S0y0vDyaF70Yd0s8d8OeXirjFs5OhSGas3ruxiK', owner_id: 'mock_owner1', owner_first_name: 'John', owner_last_name: 'Doe' },
                'luna': { id: 'mock_luna', name: 'Luna', breed: 'Tuxedo', age_years: 0.5, species: 'Cat', weight_kg: 3, bio: 'Energetic and curious kitten. Always exploring.', avatar_url: 'https://lh3.googleusercontent.com/aida-public/AB6AXuA1HTaaBQPg3n_nYf7w6etlvKrVwf6dxEoFOZAPH95jlQc0X8myrLHYV0YL5Tjo0PUsuMLUWa_wz6B-FWk6aw_x0e2Y7Gt3afAJ-B-ZQbm9wvnJhqYFndgXfVSblSmxeC_6YPpgL9xIOClSCE8MnmBWbd-JVD25BfeKNsA2ALnh4F-E4L3LurtCfYQ7drMMb8AFlDhQhAgC_K1MwBGFKPVHsC4M8MgOQETv_vWP2OkI26iXeggtM98IefRiHj22amdfkyzpMNZEBBXd', owner_id: 'mock_owner2', owner_first_name: 'Sarah', owner_last_name: 'Smith' },
                'charlie': { id: 'mock_charlie', name: 'Charlie', breed: 'Beagle', age_years: 3, species: 'Dog', weight_kg: 15, bio: 'Loves long walks and sniffing everything in sight.', avatar_url: 'https://images.unsplash.com/photo-1537151608804-ea6f117c7608?w=400', owner_id: 'mock_owner3', owner_first_name: 'Mike', owner_last_name: 'Johnson' },
                'bella': { id: 'mock_bella', name: 'Bella', breed: 'Domestic Shorthair', age_years: 1, species: 'Cat', weight_kg: 4, bio: 'Sweet, cuddly, and loves to nap in sunbeams.', avatar_url: 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400', owner_id: 'mock_owner4', owner_first_name: 'Emily', owner_last_name: 'Davis' }
            };

            let pet;

            if (mockPets[petId.toLowerCase()]) {
                pet = mockPets[petId.toLowerCase()];
                currentOwnerId = pet.owner_id;
                currentPetId = pet.id;
            } else {
                try {
                    const res = await fetch(`${API_BASE}/pets/${petId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!res.ok) throw new Error('Failed to load pet');
                    
                    const data = await res.json();
                    pet = data.pet;
                    currentOwnerId = pet.owner_id;
                    currentPetId = pet.id;
                } catch (err) {
                    console.error(err);
                    document.getElementById('petName').textContent = "Pet Not Found";
                    document.getElementById('petBio').textContent = "We couldn't find a pet with that ID.";
                    return;
                }
            }

            try {
                document.getElementById('petName').textContent = pet.name;
                document.getElementById('btnPetName').textContent = pet.name;
                document.getElementById('petBreedAge').textContent = `${pet.breed || 'Mixed'} • ${pet.age_years ? pet.age_years + ' Years' : 'Unknown'}`;
                document.getElementById('petPersonality').textContent = pet.species;
                document.getElementById('petWeight').textContent = pet.weight_kg ? `${pet.weight_kg} kg` : '--';
                document.getElementById('petBio').textContent = pet.bio || 'No bio provided.';
                document.getElementById('petImg').src = pet.avatar_url || 'https://via.placeholder.com/600?text=No+Image';
                
                const speciesTag = document.getElementById('petSpeciesTag');
                speciesTag.textContent = pet.species;
                speciesTag.className = `absolute top-4 right-4 bg-white/90 backdrop-blur px-4 py-2 rounded-full text-xs font-bold shadow-sm ${pet.species.toLowerCase() === 'cat' ? 'text-secondary' : 'text-primary'}`;
                
                // Owner Info
                document.getElementById('ownerName').textContent = `${pet.owner_first_name} ${pet.owner_last_name}`;
                document.getElementById('ownerAvatar').textContent = pet.owner_first_name[0].toUpperCase();
                
                document.title = `${pet.name} | PetPulse Profile`;
                
                checkChatStatus();
            } catch (err) {
                console.error(err);
                showToast('Failed to load pet details', 'error');
            }
        }

        async function checkChatStatus() {
            if (!token || !currentOwnerId || !currentPetId) return;
            try {
                const res = await fetch(`${API_BASE}/chat/status?receiver_id=${currentOwnerId}&pet_id=${currentPetId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    const btn = document.getElementById('chatRequestBtn');
                    if (data.status === 'pending') {
                        btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">schedule</span> Pending';
                        btn.disabled = true;
                        btn.className = "bg-slate-100 text-slate-400 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 cursor-not-allowed";
                    } else if (data.status === 'accepted') {
                        btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">chat</span> Open Chat';
                        btn.className = "bg-primary text-white hover:bg-primary-container hover:text-white px-4 py-2 rounded-xl text-sm font-bold shadow-sm transition-all flex items-center gap-2";
                        btn.onclick = () => showToast("Chat feature coming soon!");
                    } else {
                        btn.onclick = sendChatRequest;
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function sendChatRequest() {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            const btn = document.getElementById('chatRequestBtn');
            btn.innerHTML = 'Sending...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/chat/request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ receiver_id: currentOwnerId, pet_id: currentPetId })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showToast('Chat request sent to owner!');
                    checkChatStatus();
                } else {
                    showToast(data.error || 'Failed to send request', 'error');
                    btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">chat</span> Message';
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('Network error', 'error');
                btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">chat</span> Message';
                btn.disabled = false;
            }
        }

        loadPetData();
    </script>
</body>
</html>
