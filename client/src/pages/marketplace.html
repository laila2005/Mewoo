<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>PetPulse - Services Marketplace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#005da7",
                        "primary-container": "#2976c7",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#fdfcff",
                        "secondary": "#196a59",
                        "secondary-container": "#a3eed8",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#1f6e5d",
                        "tertiary": "#7b5508",
                        "tertiary-container": "#976d23",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#fffbff",
                        "background": "#f7faf9",
                        "on-background": "#181c1c",
                        "surface": "#f7faf9",
                        "on-surface": "#181c1c",
                        "surface-variant": "#e0e3e2",
                        "on-surface-variant": "#414751",
                        "outline": "#717783"
                    },
                    "fontFamily": {
                        "display-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-base": ["Plus Jakarta Sans"],
                        "body-sm": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .ambient-shadow { box-shadow: 0 8px 30px rgba(0, 93, 167, 0.08); }
    .ambient-shadow-hover:hover { box-shadow: 0 12px 40px rgba(0, 93, 167, 0.12); transform: translateY(-2px); }
</style>
</head>
<body class="bg-background text-on-background font-body-base antialiased pt-[80px]">

<!-- HEADER -->
<header class="bg-white/95 backdrop-blur-sm fixed top-0 left-0 right-0 z-50 border-b border-slate-100 shadow-[0_8px_30px_rgb(74,144,226,0.08)]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center gap-4 lg:gap-8">
        <a href="user.html" class="inline-flex items-center gap-2 flex-shrink-0">
            <img src="../assets/images/logoo.png" alt="PetPulse logo" class="h-10 w-10 object-contain" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSIjMDA1ZGE3Ij48cGF0aCBkPSJNMTIgMmMyLjIgMCA0IDMuNiA0IDZzLTEuOCA2LTRg2LTQtMy42LTQtNiAxLjgtNiA0LTZ6bS03LjUgM2MyLjIgMCA0IDEuOCA0IDRzLTEuOCA0LTQgNC00LTEuOC00LTQgMS44LTQgNC00em0xNSAwYzIuMiAwIDQgMS44IDQgNHMtMS44IDQtNCA0LTQtMS44LTQtNCAxLjgtNCA0LTR6TTEyIDIyYy00LjQgMC04LTMuNi04LThzMy42LTggOC04IDggMy42IDggOC0zLjYgOC04IDh6Ii8+PC9zdmc+'" />
            <span class="text-lg font-bold tracking-tight text-blue-600">PetPulse</span>
        </a>
        <nav class="hidden md:flex items-center justify-center gap-4 lg:gap-8 flex-1">
            <a class="text-slate-600 font-medium hover:text-blue-500 transition-all text-sm" href="user.html">Home</a>
            <a class="text-blue-600 border-b-2 border-blue-600 pb-1 font-medium transition-all text-sm" href="marketplace.html">Marketplace</a>
            <a class="text-slate-600 font-medium hover:text-blue-500 transition-all text-sm" href="community.html">Community</a>
            <a class="text-slate-600 font-medium hover:text-blue-500 transition-all text-sm" href="contact.html">Contact Us</a>
        </nav>
        <div class="flex items-center gap-3">
            <div id="authButtonsContainer" class="flex items-center gap-2">
                <button onclick="window.location.href='login.html'" class="text-slate-600 font-medium px-3 py-2 text-sm hover:text-blue-600 rounded-lg hover:bg-slate-50">Log In</button>
                <button onclick="window.location.href='signup.html'" class="bg-primary text-white font-semibold px-4 py-2 text-sm rounded-full ambient-shadow">Sign Up</button>
            </div>
            <div id="profileContainer" class="hidden items-center gap-3">
                <a href="profile.html" class="block flex-shrink-0">
                    <img id="profileImg" src="" alt="Profile" class="w-8 h-8 rounded-full border-2 border-primary object-cover">
                </a>
                <button onclick="logout()" class="text-xs text-error font-bold">Logout</button>
            </div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-12">
    <div class="text-center max-w-3xl mx-auto mb-16">
        <h1 class="text-4xl md:text-5xl font-display-lg font-bold text-slate-800 mb-6">Service Marketplace</h1>
        <p class="text-lg text-slate-500">Discover and book premium pet care services provided by our certified professionals and clinics. Everything your furry friend needs in one place.</p>
    </div>

    <!-- Filters/Search -->
    <div class="flex flex-col md:flex-row gap-4 mb-10 items-center justify-between bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <div class="relative w-full md:w-96">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
            <input type="text" id="searchInput" placeholder="Search services..." class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-primary text-sm transition-all">
        </div>
        <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-2 md:pb-0 hide-scrollbar">
            <button class="filter-btn active px-5 py-2.5 bg-blue-50 text-blue-600 font-bold text-sm rounded-xl whitespace-nowrap" data-cat="all">All Services</button>
            <button class="filter-btn px-5 py-2.5 text-slate-500 hover:bg-slate-50 font-bold text-sm rounded-xl whitespace-nowrap transition-colors" data-cat="medical">Medical</button>
            <button class="filter-btn px-5 py-2.5 text-slate-500 hover:bg-slate-50 font-bold text-sm rounded-xl whitespace-nowrap transition-colors" data-cat="grooming">Grooming</button>
            <button class="filter-btn px-5 py-2.5 text-slate-500 hover:bg-slate-50 font-bold text-sm rounded-xl whitespace-nowrap transition-colors" data-cat="training">Training</button>
        </div>
    </div>

    <!-- Services Grid -->
    <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Loading State -->
        <div class="col-span-full text-center py-20 text-slate-400">
            <span class="material-symbols-outlined text-4xl animate-spin">refresh</span>
            <p class="mt-2 font-semibold">Loading services...</p>
        </div>
    </div>
</main>

<!-- Booking Modal -->
<div id="bookingModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl transform scale-95 opacity-0 transition-all duration-300" id="bookingModalContent">
        <div class="bg-primary p-6 text-white flex justify-between items-center">
            <div>
                <h3 class="text-xl font-bold" id="modalTitle">Book Service</h3>
                <p class="text-sm opacity-80" id="modalPrice">--</p>
            </div>
            <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center bg-white/20 hover:bg-white/30 rounded-full transition-colors">
                <span class="material-symbols-outlined text-sm">close</span>
            </button>
        </div>
        <div class="p-6">
            <p class="text-sm text-slate-600 mb-6" id="modalDesc"></p>
            <form id="bookingForm" class="space-y-4">
                <input type="hidden" id="modalServiceId">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Select Date & Time</label>
                    <input type="datetime-local" id="bookingDate" required class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-primary text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Pet Name (Optional)</label>
                    <input type="text" id="bookingPetName" placeholder="E.g. Buddy" class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-primary text-sm">
                </div>
                <button type="submit" class="w-full py-4 bg-primary hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98]">Confirm Booking</button>
            </form>
        </div>
    </div>
</div>

<script>
const API_BASE = window.location.origin.includes('localhost') ? 'http://localhost:5000/api' : '/api';
let allServices = [];

async function checkAuth() {
    const token = localStorage.getItem('token');
    const userJson = localStorage.getItem('user');
    if (token && userJson) {
        document.getElementById('authButtonsContainer').classList.add('hidden');
        document.getElementById('profileContainer').classList.replace('hidden', 'flex');
        document.getElementById('profileContainer').classList.remove('hidden');
        const user = JSON.parse(userJson);
        document.getElementById('profileImg').src = user.avatar_url || `https://ui-avatars.com/api/?name=${user.first_name}+${user.last_name}&background=005da7&color=fff`;
    }
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.reload();
}

async function fetchServices() {
    try {
        const res = await fetch(`${API_BASE}/services`);
        if (res.ok) {
            const data = await res.json();
            allServices = data.services || [];
            renderServices(allServices);
        } else {
            document.getElementById('servicesGrid').innerHTML = '<div class="col-span-full text-center py-20 text-error font-bold">Failed to load marketplace.</div>';
        }
    } catch(e) {
        console.error(e);
        document.getElementById('servicesGrid').innerHTML = '<div class="col-span-full text-center py-20 text-error font-bold">Error connecting to server.</div>';
    }
}

function renderServices(services) {
    const grid = document.getElementById('servicesGrid');
    if (services.length === 0) {
        grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400 font-bold">No services found matching your criteria.</div>';
        return;
    }

    grid.innerHTML = services.map(s => {
        // Map category to icon
        const iconMap = {
            'walking': 'directions_walk',
            'sitting': 'chair_alt',
            'training': 'school',
            'grooming': 'content_cut',
            'medical': 'medical_services',
            'boarding': 'night_shelter'
        };
        const icon = iconMap[s.category?.toLowerCase()] || 'pets';
        
        return `
        <div class="bg-white rounded-3xl border border-slate-100 overflow-hidden ambient-shadow-hover transition-all flex flex-col group">
            <div class="p-6 pb-0 flex items-start justify-between">
                <div class="w-14 h-14 rounded-2xl bg-blue-50 text-primary flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
                    <span class="material-symbols-outlined text-[28px]">${icon}</span>
                </div>
                <span class="px-3 py-1 bg-slate-100 text-slate-500 rounded-full text-[10px] font-bold uppercase tracking-wider">${s.category || 'Service'}</span>
            </div>
            <div class="p-6 flex-1 flex flex-col">
                <h3 class="text-lg font-bold text-slate-800 leading-tight mb-2">${s.title}</h3>
                <p class="text-sm text-slate-500 line-clamp-2 mb-4">${s.description || 'No description provided.'}</p>
                <div class="mt-auto flex items-end justify-between">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Provider</p>
                        <p class="text-sm font-semibold text-slate-700">${s.first_name ? s.first_name + ' ' + s.last_name : 'PetPulse Staff'}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black text-primary">$${s.base_price}</p>
                    </div>
                </div>
            </div>
            <div class="p-4 pt-0">
                <button onclick="openBookingModal('${s.id}')" class="w-full py-3.5 bg-slate-50 hover:bg-primary hover:text-white text-primary font-bold rounded-xl transition-colors">Purchase / Book Now</button>
            </div>
        </div>
    `}).join('');
}

// Modal Logic
function openBookingModal(id) {
    const token = localStorage.getItem('token');
    if(!token) return window.location.href = 'login.html';

    const service = allServices.find(s => s.id == id);
    if(!service) return;

    document.getElementById('modalTitle').innerText = service.title;
    document.getElementById('modalPrice').innerText = '$' + service.base_price;
    document.getElementById('modalDesc').innerText = service.description;
    document.getElementById('modalServiceId').value = service.id;

    const modal = document.getElementById('bookingModal');
    const content = document.getElementById('bookingModalContent');
    
    modal.classList.remove('hidden');
    setTimeout(() => {
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');
    }, 10);
}

function closeModal() {
    const modal = document.getElementById('bookingModal');
    const content = document.getElementById('bookingModalContent');
    
    content.classList.remove('scale-100', 'opacity-100');
    content.classList.add('scale-95', 'opacity-0');
    
    setTimeout(() => modal.classList.add('hidden'), 300);
}

// Handle Form Submit
document.getElementById('bookingForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const token = localStorage.getItem('token');
    const serviceId = document.getElementById('modalServiceId').value;
    const date = document.getElementById('bookingDate').value;
    const petName = document.getElementById('bookingPetName').value;

    const btn = e.target.querySelector('button[type="submit"]');
    const originalText = btn.innerText;
    btn.innerText = 'Processing...';
    btn.disabled = true;

    try {
        const res = await fetch(`${API_BASE}/bookings/services`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                service_id: serviceId,
                start_time: date,
                pet_name: petName
            })
        });

        if (res.ok) {
            alert('Booking successful!');
            closeModal();
            e.target.reset();
        } else {
            const err = await res.json();
            alert('Failed to book: ' + (err.error || 'Unknown error'));
        }
    } catch(err) {
        alert('Server error occurred.');
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
});

// Setup filters
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('bg-blue-50', 'text-blue-600');
            b.classList.add('text-slate-500');
        });
        e.target.classList.remove('text-slate-500');
        e.target.classList.add('bg-blue-50', 'text-blue-600');
        
        const cat = e.target.getAttribute('data-cat');
        if(cat === 'all') renderServices(allServices);
        else renderServices(allServices.filter(s => s.category?.toLowerCase() === cat));
    });
});

// Setup search
document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    renderServices(allServices.filter(s => 
        s.title.toLowerCase().includes(term) || 
        (s.description && s.description.toLowerCase().includes(term))
    ));
});

// Init
checkAuth();
fetchServices();
</script>
</body></html>
