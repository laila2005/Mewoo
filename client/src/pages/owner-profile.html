<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Profile | PetPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/index.css">
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#005da7",
                        "primary-container": "#2976c7",
                        "on-primary": "#ffffff",
                        secondary: "#196a59"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body-base antialiased selection:bg-primary/20 selection:text-primary flex flex-col min-h-screen">
    
    <!-- HEADER -->
    <header class="bg-white/95 backdrop-blur-sm fixed top-0 left-0 right-0 z-50 border-b border-slate-100 shadow-[0_8px_30px_rgb(74,144,226,0.08)]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center gap-4 lg:gap-8">
            <a href="user.html" class="inline-flex items-center gap-2 flex-shrink-0">
                <img src="../assets/images/logoo.png" alt="PetPulse logo" class="h-10 w-10 object-contain" />
                <span class="text-lg font-bold tracking-tight text-blue-600">PetPulse</span>
            </a>
            <nav class="hidden md:flex items-center justify-center gap-4 lg:gap-8 flex-1">
                <a class="text-slate-600 font-medium hover:text-blue-500 transition-all text-sm" href="user.html">Home</a>
                <a class="text-slate-600 font-medium hover:text-blue-500 transition-all text-sm" href="marketplace.html">Marketplace</a>
                <a class="text-slate-600 font-medium hover:text-blue-500 transition-all text-sm" href="explore.html">Services</a>
                <a class="text-slate-600 font-medium hover:text-blue-500 transition-all text-sm" href="community.html">Community</a>
                <a class="text-slate-600 font-medium hover:text-blue-500 transition-all text-sm" href="contact.html">Contact Us</a>
            </nav>
            <div class="flex items-center gap-3">
                <div id="profileContainer" class="items-center gap-3 flex">
                    <div id="navProfileSection" class="flex items-center gap-3">
                        <a href="profile.html" class="block flex-shrink-0">
                            <img id="navProfileImg" alt="Profile" class="w-9 h-9 rounded-full border-2 border-primary/30 object-cover cursor-pointer hover:border-primary transition-colors" src="https://via.placeholder.com/40">
                        </a>
                        <button onclick="window.location.href='login.html'" class="text-slate-500 hover:text-blue-600 text-sm font-medium px-2 py-1.5 rounded-lg hover:bg-slate-50 transition-all">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow py-12 max-w-5xl mx-auto px-4 sm:px-6 w-full">
        <!-- Breadcrumb -->
        <div class="flex items-center gap-2 text-sm text-slate-500 mb-8 cursor-pointer hover:text-primary transition-colors w-fit" onclick="window.history.back()">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Back
        </div>

        <div class="bg-white rounded-3xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.08)] border border-slate-100 overflow-hidden mb-12 relative">
            <div class="h-40 bg-gradient-to-r from-blue-600 to-indigo-600 relative overflow-hidden">
                <div class="absolute inset-0 bg-white/10 pattern-dots"></div>
            </div>
            
            <div class="px-8 pb-8 md:px-12 md:pb-12 relative">
                <div class="flex flex-col md:flex-row gap-6 md:gap-8 items-start md:items-end -mt-20 mb-8">
                    <div class="w-36 h-36 rounded-full border-4 border-white bg-slate-100 flex items-center justify-center overflow-hidden shadow-xl flex-shrink-0 relative z-10">
                        <img id="ownerAvatar" src="" alt="Owner" class="w-full h-full object-cover hidden">
                        <span id="ownerInitial" class="text-5xl font-bold text-slate-400">?</span>
                    </div>
                    <div class="flex-grow pt-4 md:pt-0">
                        <h1 id="ownerName" class="text-3xl md:text-4xl font-black text-slate-900 mb-2">Loading...</h1>
                        <div class="flex items-center gap-4 text-sm font-medium text-slate-500">
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px] text-blue-500">verified</span> Verified Member</span>
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">star</span> 4.9 Rating</span>
                        </div>
                    </div>
                    <button id="messageBtn" class="w-full md:w-auto mt-4 md:mt-0 bg-primary hover:bg-blue-700 text-white font-bold py-3.5 px-8 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-500/30 active:scale-[0.98]">
                        <span class="material-symbols-outlined text-[20px]">chat</span> Send Message
                    </button>
                </div>

                <div class="bg-blue-50/50 rounded-2xl p-6 md:p-8 border border-blue-100/50 mb-10">
                    <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">person</span> About Me
                    </h3>
                    <p id="ownerBio" class="text-slate-700 leading-relaxed text-base">Passionate pet lover.</p>
                </div>

                <div class="border-t border-slate-100 pt-10">
                    <h3 class="text-xl font-bold text-slate-900 mb-6 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">pets</span> Pets Hosted by this Owner
                    </h3>
                    
                    <div id="petsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Pets will be rendered here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-50 border-t border-slate-200 w-full mt-auto py-8 sm:py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8 border-t border-slate-200 text-center">
            <p class="text-slate-500 text-sm">© 2026 PetPulse. Compassionate Care for Every Companion.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <script>
        const API_BASE = window.location.origin.includes('localhost') ? 'http://localhost:5000/api' : '/api';
        const token = localStorage.getItem('token');

        function showToast(msg, type='success') {
            Toastify({ text: msg, duration: 3000, style: { background: type==='error'?'#ba1a1a':'#005da7' } }).showToast();
        }

        async function loadOwnerData() {
            const params = new URLSearchParams(window.location.search);
            const ownerId = params.get('id');

            if (!ownerId) {
                document.getElementById('ownerName').textContent = "Owner Not Found";
                return;
            }

            // MOCK DATA
            const mockOwners = {
                'mock_owner1': { name: 'John Doe', avatar: 'https://i.pravatar.cc/150?u=mock1', bio: 'I love dogs and have been taking care of them for years. Currently hosting Milo!', pets: [{id: 'milo', name: 'Milo', type: 'Dog', img: 'https://lh3.googleusercontent.com/aida-public/AB6AXuBIYDqvNenCMOIcovCc3-8JiqPFIFVMge8QT3kBMGgY00RFtQZz36_5xeoOW6u0MeSzrPwrScDyyg5-PmQsx0vDvS33gAEL7AofIxjdu2mkHYU3JR6laFwWrOF-E9R5GDlnQPOBWNtOfKufF4lhgc4Dwztk2BpH4JSL_NInA1FCEUwfhpqx9AKWHdhOoGlYnSN3rtBpm1mrdIVYyiV4T5xAXLW--qQXHJOKiNqx3S0y0vDyaF70Yd0s8d8OeXirjFs5OhSGas3ruxiK'}] },
                'mock_owner2': { name: 'Sarah Smith', avatar: 'https://i.pravatar.cc/150?u=mock2', bio: 'Proud cat mom. Luna is my favorite little troublemaker.', pets: [{id: 'luna', name: 'Luna', type: 'Cat', img: 'https://lh3.googleusercontent.com/aida-public/AB6AXuA1HTaaBQPg3n_nYf7w6etlvKrVwf6dxEoFOZAPH95jlQc0X8myrLHYV0YL5Tjo0PUsuMLUWa_wz6B-FWk6aw_x0e2Y7Gt3afAJ-B-ZQbm9wvnJhqYFndgXfVSblSmxeC_6YPpgL9xIOClSCE8MnmBWbd-JVD25BfeKNsA2ALnh4F-E4L3LurtCfYQ7drMMb8AFlDhQhAgC_K1MwBGFKPVHsC4M8MgOQETv_vWP2OkI26iXeggtM98IefRiHj22amdfkyzpMNZEBBXd'}] },
                'mock_owner3': { name: 'Mike Johnson', avatar: 'https://i.pravatar.cc/150?u=mock3', bio: 'Always out on a hike with my Beagle, Charlie.', pets: [{id: 'charlie', name: 'Charlie', type: 'Dog', img: 'https://images.unsplash.com/photo-1537151608804-ea6f117c7608?w=400'}] },
                'mock_owner4': { name: 'Emily Davis', avatar: 'https://i.pravatar.cc/150?u=mock4', bio: 'Passionate about animal rescue. Bella is my current foster fail!', pets: [{id: 'bella', name: 'Bella', type: 'Cat', img: 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400'}] },
            };

            let currentUserId = null;
            if (token) {
                try {
                    const meRes = await fetch(`${API_BASE}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` }});
                    if (meRes.ok) {
                        const meData = await meRes.json();
                        currentUserId = meData.user.id;
                    }
                } catch(e) {}
            }

            if (ownerId.startsWith('mock_')) {
                ownerData = mockOwners[ownerId];
            } else {
                try {
                    const res = await fetch(`${API_BASE}/users/${ownerId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        ownerData = {
                            name: `${data.user.first_name} ${data.user.last_name}`,
                            avatar: data.user.avatar_url || data.user.profile_pic_url,
                            bio: data.user.bio || 'Pet lover on PetPulse.',
                            pets: [] // We don't have a public pets API endpoint right now, so we leave it empty for real users unless we add one.
                        };
                    } else {
                        document.getElementById('ownerName').textContent = "Owner Not Found";
                        return;
                    }
                } catch(e) {
                    console.error(e);
                    return;
                }
            }

            if (!ownerData) return;

            document.getElementById('ownerName').textContent = ownerData.name;
            if (ownerData.avatar) {
                document.getElementById('ownerAvatar').src = ownerData.avatar;
                document.getElementById('ownerAvatar').classList.remove('hidden');
                document.getElementById('ownerInitial').classList.add('hidden');
            } else {
                document.getElementById('ownerInitial').textContent = ownerData.name[0];
            }

            document.getElementById('ownerBio').textContent = ownerData.bio;
            
            const msgBtn = document.getElementById('messageBtn');
            
            if (currentUserId === ownerId) {
                msgBtn.innerHTML = '<span class="material-symbols-outlined text-[18px]">edit</span> Edit My Profile';
                msgBtn.onclick = () => window.location.href = 'edit-profile.html';
                msgBtn.className = "w-full md:w-auto mt-4 md:mt-0 bg-slate-100 text-slate-800 hover:bg-slate-200 font-bold py-3.5 px-8 rounded-xl flex items-center justify-center gap-2 transition-all shadow-sm";
            } else {
                // Check status
                let chatStatus = 'none';
                try {
                    if (token) {
                        const statusRes = await fetch(`${API_BASE}/chat/status?receiver_id=${ownerId}`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (statusRes.ok) {
                            const statusData = await statusRes.json();
                            chatStatus = statusData.status;
                        }
                    }
                } catch(e) {}

                if (chatStatus === 'pending') {
                    msgBtn.innerHTML = '<span class="material-symbols-outlined text-[18px]">schedule</span> Pending';
                    msgBtn.className = "w-full md:w-auto mt-4 md:mt-0 bg-slate-100 text-slate-400 font-bold py-3.5 px-8 rounded-xl flex items-center justify-center gap-2 cursor-not-allowed";
                    msgBtn.disabled = true;
                } else if (chatStatus === 'accepted') {
                    msgBtn.innerHTML = '<span class="material-symbols-outlined text-[18px]">chat</span> Chat Now';
                    msgBtn.onclick = () => window.location.href = `messages.html?user=${ownerId}`;
                } else {
                    msgBtn.onclick = async () => {
                        if(!token) return window.location.href='login.html';
                        msgBtn.innerHTML = '<span class="material-symbols-outlined text-[20px] animate-spin">refresh</span> Sending...';
                        msgBtn.disabled = true;
                        try {
                            const reqRes = await fetch(`${API_BASE}/chat/request`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ receiver_id: ownerId })
                            });
                            if (reqRes.ok) {
                                showToast('Connection request sent!');
                                msgBtn.innerHTML = '<span class="material-symbols-outlined text-[18px]">schedule</span> Pending';
                                msgBtn.className = "w-full md:w-auto mt-4 md:mt-0 bg-slate-100 text-slate-400 font-bold py-3.5 px-8 rounded-xl flex items-center justify-center gap-2 cursor-not-allowed";
                            } else {
                                const err = await reqRes.json();
                                showToast(err.error || 'Failed to send request', 'error');
                                msgBtn.disabled = false;
                                msgBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]">chat</span> Send Message';
                            }
                        } catch(e) {
                            showToast('Failed to send request', 'error');
                            msgBtn.disabled = false;
                            msgBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]">chat</span> Send Message';
                        }
                    };
                }
            }

            // Render pets
            const grid = document.getElementById('petsGrid');
            if (ownerData.pets && ownerData.pets.length > 0) {
                grid.innerHTML = ownerData.pets.map(p => `
                    <a href="pet-profile.html?pet=${p.id}" class="block group bg-white rounded-2xl border border-slate-100 overflow-hidden hover:border-primary hover:shadow-lg transition-all">
                        <div class="h-40 bg-slate-100 relative overflow-hidden">
                            <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform" alt="${p.name}">
                            <span class="absolute top-2 right-2 bg-white/90 px-3 py-1 rounded-full text-[10px] font-bold text-primary shadow-sm">${p.type}</span>
                        </div>
                        <div class="p-4">
                            <h4 class="font-bold text-slate-800">${p.name}</h4>
                        </div>
                    </a>
                `).join('');
            } else {
                grid.innerHTML = '<p class="text-slate-400 italic text-sm col-span-full">No public pets listed.</p>';
            }
        }
        async function loadNavProfile() {
            if(!token) return;
            try {
                const res = await fetch(`${API_BASE}/users/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if(res.ok) {
                    const data = await res.json();
                    document.getElementById('navProfileImg').src = data.user.profile_pic_url || data.user.avatar_url || 'https://via.placeholder.com/40';
                }
            } catch(e) { console.error('Error loading nav profile', e); }
        }

        loadNavProfile();
        loadOwnerData();
    </script>
</body>
</html>
