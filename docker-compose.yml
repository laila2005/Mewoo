version: '3.8'

services:
  # Database with PostGIS extension pre-installed
  db:
    image: postgis/postgis:15-3.3
    container_name: petpulse_db
    environment:
      POSTGRES_USER: petpulse_admin
      POSTGRES_PASSWORD: petpulse_password123
      POSTGRES_DB: petpulse_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  # Database GUI (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: petpulse_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@petpulse.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

  # Redis for caching, rate-limiting, and socket.io scaling
  redis:
    image: redis:7-alpine
    container_name: petpulse_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  db_data:
