<!DOCTYPE html>
<html>
  <head>
    <title>Mewoo API Reference</title>
    <!-- required for mobile scale -->
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700" rel="stylesheet">

    <!-- Redoc Styling & Overrides to match Mewoo brand -->
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      /* Dark mode customizations to match the high-end theme */
      body { margin: 0; padding: 0; background-color: #0f172a !important; color: #e2e8f0 !important; }
      
      /* Force Schema Tables to be readable in dark mode */
      table span, table td, table div { color: #cbd5e1 !important; }
      .property-name { color: #f8fafc !important; font-weight: bold !important; }
      tr { border-bottom: 1px solid rgba(255,255,255,0.1) !important; }
      
      /* Fix Right Panel Tabs (Payload / 200) so text is visible */
      .react-tabs__tab { 
        background-color: rgba(255,255,255,0.1) !important; 
        color: #f8fafc !important; 
        border: 1px solid rgba(255,255,255,0.2) !important; 
      }
      .react-tabs__tab--selected { 
        background-color: #38bdf8 !important; 
        color: #0f172a !important; 
        font-weight: bold; 
      }
      
      .menu-content {
        background-color: #0f172a !important;
        border-right: 1px solid rgba(255, 255, 255, 0.05);
      }
      .menu-content li[role="nav-item"] a {
        color: #94a3b8 !important;
      }
      .menu-content li[role="nav-item"] a.active {
        color: #38bdf8 !important;
        background-color: rgba(56, 189, 248, 0.1) !important;
        border-left: 3px solid #38bdf8;
      }
      h1 {
        background: linear-gradient(to right, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .api-info-wrapper {
        padding-top: 50px;
      }
    </style>
  </head>
  <body>
    <!-- Redoc HTML element -->
    <div id="redoc-container"></div>
    
    <!-- Link to the Redoc standalone script from CDN -->
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"> </script>

    <!-- Configure Redoc Theme via Javascript -->
    <script>
      const spec = {
        "openapi": "3.0.3",
        "info": {
          "title": "Mewoo Backend API",
          "description": "Enterprise-grade REST API powering the Mewoo Pet Care & Community Platform. Includes endpoints for Authentication, Vet Triage, and Geolocation Services.",
          "version": "1.0.0",
          "contact": { "name": "Mewoo Engineering Team", "email": "api@mewoo.com" }
        },
        "servers": [
          { "url": "http://localhost:5000/api", "description": "Local Development Server" },
          { "url": "https://api.mewoo.com/v1", "description": "Production Server" }
        ],
        "components": {
          "securitySchemes": {
            "bearerAuth": { "type": "http", "scheme": "bearer", "bearerFormat": "JWT", "description": "Enter your JWT token to access protected routes." }
          },
          "schemas": {
            "User": {
              "type": "object",
              "properties": {
                "id": { "type": "string", "format": "uuid" },
                "email": { "type": "string", "format": "email" },
                "first_name": { "type": "string" },
                "last_name": { "type": "string" },
                "role": { "type": "string", "enum": ["owner", "vet", "trainer", "admin"] }
              }
            },
            "ErrorResponse": { "type": "object", "properties": { "error": { "type": "string" } } }
          }
        },
        "tags": [
          { "name": "Authentication", "description": "Endpoints for user registration and JWT token generation." },
          { "name": "AI Intelligence", "description": "Endpoints bridging the mobile client with the Agentic AI microservice." }
        ],
        "paths": {
          "/auth/register": {
            "post": {
              "tags": ["Authentication"],
              "summary": "Register a new user",
              "description": "Creates a new user record in the database and hashes their password securely.",
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": {
                      "type": "object",
                      "required": ["email", "password", "first_name", "last_name"],
                      "properties": {
                        "email": { "type": "string", "format": "email" },
                        "password": { "type": "string", "format": "password" },
                        "first_name": { "type": "string" },
                        "last_name": { "type": "string" },
                        "role": { "type": "string", "enum": ["owner", "vet", "trainer"] }
                      }
                    }
                  }
                }
              },
              "responses": {
                "201": {
                  "description": "User created successfully",
                  "content": {
                    "application/json": { "schema": { "type": "object", "properties": { "message": { "type": "string" }, "user": { "$ref": "#/components/schemas/User" } } } }
                  }
                },
                "400": { "description": "Missing required fields" },
                "409": { "description": "Email already in use" }
              }
            }
          },
          "/auth/login": {
            "post": {
              "tags": ["Authentication"],
              "summary": "Authenticate user",
              "description": "Verifies credentials and returns a JSON Web Token (JWT) valid for 7 days.",
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "type": "object", "required": ["email", "password"], "properties": { "email": { "type": "string", "format": "email" }, "password": { "type": "string", "format": "password" } } }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Login successful",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "object",
                        "properties": { "message": { "type": "string" }, "token": { "type": "string" }, "user": { "type": "object", "properties": { "id": { "type": "string" }, "email": { "type": "string" }, "role": { "type": "string" } } } }
                      }
                    }
                  }
                },
                "401": { "description": "Invalid credentials" }
              }
            }
          },
          "/ai/triage": {
            "post": {
              "tags": ["AI Intelligence"],
              "summary": "Agentic Vet Triage",
              "description": "Submits pet symptoms to the AI Agent. The agent automatically processes the symptoms, determines urgency, and utilizes spatial indexing to locate nearby emergency clinics.",
              "security": [{ "bearerAuth": [] }],
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": {
                      "type": "object",
                      "required": ["symptoms"],
                      "properties": {
                        "symptoms": { "type": "string", "example": "My dog is panting heavily and threw up twice in the last hour." },
                        "petId": { "type": "string", "format": "uuid" },
                        "userLocation": { "type": "object", "properties": { "lat": { "type": "number", "example": 34.0522 }, "lng": { "type": "number", "example": -118.2437 } } }
                      }
                    }
                  }
                }
              },
              "responses": {
                "200": {
                  "description": "Triage analysis and automated booking response",
                  "content": {
                    "application/json": { "schema": { "type": "object", "properties": { "success": { "type": "boolean" }, "response": { "type": "string" } } } }
                  }
                },
                "401": { "description": "Unauthorized - Valid JWT token required" }
              }
            }
          }
        }
      };

      Redoc.init(spec, {
        theme: {
          colors: { 
            primary: { main: '#38bdf8' }, 
            success: { main: '#10b981' }, 
            error: { main: '#ef4444' },
            text: { primary: '#f8fafc', secondary: '#94a3b8' }
          },
          typography: { fontFamily: 'Roboto, sans-serif', headings: { fontFamily: 'Montserrat, sans-serif', fontWeight: '700' } },
          sidebar: { backgroundColor: '#0f172a', textColor: '#e2e8f0', activeTextColor: '#38bdf8' },
          rightPanel: { backgroundColor: '#1e293b', textColor: '#f8fafc' }
        }
      }, document.getElementById('redoc-container'));
    </script>
  </body>
</html>
