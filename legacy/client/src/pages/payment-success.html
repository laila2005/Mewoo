<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Payment Successful - PetPulse</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-xl border border-slate-100 text-center relative overflow-hidden">
    <div class="w-full h-32 bg-green-50 absolute top-0 left-0 right-0"></div>
    
    <div class="relative z-10">
        <div class="w-20 h-20 bg-green-500 rounded-full text-white flex items-center justify-center mx-auto mb-6 shadow-lg shadow-green-500/30 border-4 border-white">
            <span class="material-symbols-outlined text-4xl font-bold">check</span>
        </div>
        
        <h1 class="text-2xl font-black text-slate-900 mb-2">Payment Successful!</h1>
        <p class="text-slate-500 mb-8">Thank you for your purchase. Your order has been processed securely via Paymob.</p>
        
        <div class="bg-slate-50 rounded-2xl p-4 text-left mb-8 space-y-2 border border-slate-100">
            <div class="flex justify-between text-sm">
                <span class="text-slate-500">Order ID</span>
                <span class="font-bold text-slate-800" id="orderIdDisplay">#---</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-slate-500">Status</span>
                <span class="font-bold text-green-600">Paid / Verified</span>
            </div>
        </div>
        
        <a href="marketplace.html" class="block w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition-colors">
            Continue Shopping
        </a>
        <a href="user.html" class="block w-full py-3 mt-3 text-slate-500 hover:text-slate-800 font-bold transition-colors text-sm">
            Return to Dashboard
        </a>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('order_id');
    if(orderId) {
        document.getElementById('orderIdDisplay').textContent = '#' + orderId.substring(0, 8).toUpperCase();
    }
</script>
</body></html>
