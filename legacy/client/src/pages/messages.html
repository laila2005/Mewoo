<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | PetPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <link rel="stylesheet" href="../styles/index.css">
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#005da7",
                        "primary-container": "#2976c7",
                        "on-primary": "#ffffff",
                        secondary: "#196a59"
                    }
                }
            }
        }
    </script>
    <style>
        .chat-sidebar {
            height: calc(100vh - 80px);
        }

        .chat-main {
            height: calc(100vh - 80px);
        }

        .msg-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .msg-sent {
            background: #005da7;
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        .msg-received {
            background: #f1f5f9;
            color: #334155;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        .convo-item.active {
            background: #eff6ff;
            border-left: 4px solid #005da7;
        }

        #chatMessages {
            scroll-behavior: smooth;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-body-base antialiased flex flex-col min-h-screen overflow-hidden">

    <!-- HEADER -->
    <div id="app-navbar"></div>
<script src="../components/navbar.js"></script>

    <div class="flex flex-1 overflow-hidden w-full max-w-[1600px] mx-auto bg-white shadow-xl shadow-slate-200/50">
        <!-- SIDEBAR -->
        <div class="w-[340px] border-r border-slate-200 flex flex-col chat-sidebar shrink-0 bg-white">
            <div class="p-4 border-b border-slate-100 shrink-0 flex items-center gap-3">
                <button onclick="window.history.back()"
                    class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-500 transition-colors"
                    title="Go Back">
                    <span class="material-symbols-outlined text-[20px]">arrow_back</span>
                </button>
                <h2 class="text-xl font-bold text-slate-800 tracking-tight">Messages</h2>
            </div>
            
            <div class="p-3 border-b border-slate-100 shrink-0 bg-slate-50/50">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">search</span>
                    <input type="text" id="userSearchInput" placeholder="Find users to message..." autocomplete="off" class="w-full bg-white border border-slate-200 rounded-xl py-2 pl-9 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm">
                    
                    <div id="userSearchResults" class="hidden absolute top-full left-0 right-0 mt-2 bg-white rounded-xl shadow-xl border border-slate-100 z-50 max-h-64 overflow-y-auto divide-y divide-slate-50">
                        <!-- Results -->
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto">
                <!-- Pending Requests Section -->
                <div id="pendingRequestsSection" class="hidden">
                    <div class="px-4 py-3 bg-blue-50/50 border-b border-blue-100 flex items-center justify-between">
                        <span class="text-xs font-bold text-blue-800 uppercase tracking-wider">Pending Requests</span>
                        <span id="pendingCount"
                            class="bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <div id="requestsList" class="divide-y divide-slate-100">
                        <!-- Requests injected here -->
                    </div>
                </div>

                <!-- System Alerts Section -->
                <div id="systemAlertsSection" class="hidden">
                    <div class="px-4 py-3 bg-amber-50/50 border-b border-amber-100 flex items-center justify-between">
                        <span class="text-xs font-bold text-amber-800 uppercase tracking-wider">System Alerts</span>
                        <span id="alertsCount"
                            class="bg-amber-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <div id="alertsList" class="divide-y divide-slate-100 max-h-60 overflow-y-auto">
                    </div>
                </div>

                <!-- Conversations Section -->
                <div class="px-4 py-3 bg-slate-50/80 border-b border-slate-100">
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Conversations</span>
                </div>
                <div id="conversationsList" class="divide-y divide-slate-100">
                    <div class="p-8 text-center text-slate-400">
                        <span class="material-symbols-outlined text-4xl mb-2 opacity-50">forum</span>
                        <p class="text-sm">No conversations yet.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN CHAT AREA -->
        <div class="flex-1 flex flex-col chat-main bg-slate-50 relative">

            <!-- Default State -->
            <div id="noChatState" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-50 z-10">
                <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center mb-6 shadow-inner">
                    <span class="material-symbols-outlined text-5xl text-blue-500">chat</span>
                </div>
                <h3 class="text-2xl font-bold text-slate-800 mb-2">Your Messages</h3>
                <p class="text-slate-500 text-center max-w-sm">Select a conversation or accept a pending request to
                    start chatting.</p>
            </div>

            <!-- Active Chat Header -->
            <div id="activeChatHeader"
                class="h-[72px] bg-white border-b border-slate-200 flex items-center px-6 shrink-0 hidden">
                <div class="flex items-center gap-4 cursor-pointer"
                    onclick="window.location.href='owner-profile.html?id=' + currentChatUserId">
                    <img id="chatAvatar" src="" class="w-11 h-11 rounded-full object-cover border border-slate-200">
                    <div>
                        <h3 id="chatName" class="font-bold text-slate-900 leading-tight">...</h3>
                        <p class="text-xs font-medium text-emerald-600 flex items-center gap-1"><span
                                class="w-1.5 h-1.5 bg-emerald-500 rounded-full inline-block"></span> Online</p>
                    </div>
                </div>
            </div>

            <!-- Chat Messages -->
            <div id="chatMessages" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 hidden">
                <!-- Messages injected here -->
            </div>

            <!-- Chat Input -->
            <div id="chatInputArea" class="p-4 bg-white border-t border-slate-200 shrink-0 hidden">
                <form id="chatForm" class="flex items-end gap-3 max-w-4xl mx-auto">
                    <button type="button"
                        class="p-3 text-slate-400 hover:text-blue-500 hover:bg-blue-50 rounded-full transition-colors shrink-0">
                        <span class="material-symbols-outlined">add_photo_alternate</span>
                    </button>
                    <div
                        class="flex-1 bg-slate-100 rounded-2xl flex items-center pr-2 relative border border-transparent focus-within:border-blue-300 focus-within:bg-white focus-within:ring-4 focus-within:ring-blue-100 transition-all">
                        <input type="text" id="messageInput" placeholder="Type a message..."
                            class="w-full bg-transparent border-none focus:ring-0 py-3.5 pl-4 text-slate-800 placeholder-slate-400"
                            autocomplete="off">
                        <button type="submit"
                            class="w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center hover:bg-blue-700 transition-colors shadow-sm shrink-0">
                            <span class="material-symbols-outlined text-[20px]">send</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

    <script>
        const API_BASE = window.location.origin.includes('localhost') ? 'http://localhost:5000/api' : '/api';
        const SOCKET_URL = window.location.origin.includes('localhost') ? 'http://localhost:5000' : window.location.origin;
        const token = localStorage.getItem('token');
        let currentUser = null;
        let currentChatUserId = null;
        let socket = null;

        if (!token) window.location.href = 'login.html';

        function showToast(msg, type = 'success') {
            Toastify({ text: msg, duration: 3000, style: { background: type === 'error' ? '#ba1a1a' : '#005da7' } }).showToast();
        }

        async function init() {
            try {
                const res = await fetch(`${API_BASE}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const data = await res.json();
                    currentUser = data.user;
                    initSocket();
                    await loadRequests();
                    await loadAlerts();
                    await loadConversations();

                    const params = new URLSearchParams(window.location.search);
                    if (params.get('user')) openChat(params.get('user'));
                } else {
                    window.location.href = 'login.html';
                }
            } catch (e) {
                console.error(e);
            }
        }

        function initSocket() {
            socket = io(SOCKET_URL, {
                auth: { token: token }
            });


            socket.on('receive_message', (msg) => {
                // If we are currently chatting with the sender, append it
                if (msg.sender_id === currentChatUserId || msg.receiver_id === currentChatUserId) {
                    appendMessage(msg, false);
                    scrollToBottom();
                }
                // Refresh conversations list to update latest message
                loadConversations();
            });

            socket.on('message_sent', (msg) => {
                appendMessage(msg, true);
                scrollToBottom();
                loadConversations();
            });
        }

        async function loadRequests() {
            try {
                const res = await fetch(`${API_BASE}/chat/requests`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const data = await res.json();
                    const reqList = document.getElementById('requestsList');
                    const section = document.getElementById('pendingRequestsSection');

                    if (data.requests.length > 0) {
                        section.classList.remove('hidden');
                        document.getElementById('pendingCount').textContent = data.requests.length;
                        reqList.innerHTML = data.requests.map(r => `
                            <div class="p-4 hover:bg-slate-50 transition-colors">
                                <div class="flex items-center gap-3 mb-3">
                                    <img src="${r.avatar_url || r.profile_pic_url || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-full object-cover">
                                    <div>
                                        <p class="font-bold text-sm text-slate-800">${r.first_name} ${r.last_name}</p>
                                        <p class="text-xs ${r.pet_id ? 'text-primary font-semibold' : 'text-slate-500'}">
                                            ${r.pet_id ? 'Wants to adopt ' + r.pet_name : 'Wants to chat'}
                                        </p>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="acceptRequest('${r.id}')" class="flex-1 bg-blue-600 text-white text-xs font-bold py-2 rounded-lg hover:bg-blue-700 transition-colors">Accept</button>
                                    <button onclick="ignoreRequest('${r.id}')" class="flex-1 bg-slate-100 text-slate-600 text-xs font-bold py-2 rounded-lg hover:bg-slate-200 transition-colors">Ignore</button>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        section.classList.add('hidden');
                        reqList.innerHTML = '';
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function loadAlerts() {
            try {
                const res = await fetch(`${API_BASE}/users/notifications/alerts`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const data = await res.json();
                    const list = document.getElementById('alertsList');
                    const section = document.getElementById('systemAlertsSection');

                    if (data.alerts && data.alerts.length > 0) {
                        section.classList.remove('hidden');
                        document.getElementById('alertsCount').textContent = data.alerts.length;
                        list.innerHTML = data.alerts.map(a => `
                            <div class="p-4 ${!a.is_read ? 'bg-amber-50/30' : ''} hover:bg-slate-50 transition-colors">
                                <p class="font-bold text-sm text-slate-800">${a.title}</p>
                                <p class="text-xs text-slate-600 mt-1">${a.message}</p>
                                <p class="text-[10px] text-slate-400 mt-2">${new Date(a.created_at).toLocaleString()}</p>
                            </div>
                        `).join('');
                    } else {
                        section.classList.add('hidden');
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function acceptRequest(id) {
            try {
                const res = await fetch(`${API_BASE}/chat/request/${id}/accept`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showToast('Request accepted!');
                    await loadRequests();
                    await loadConversations();
                }
            } catch (e) { console.error(e); }
        }

        async function ignoreRequest(id) {
            try {
                const res = await fetch(`${API_BASE}/chat/request/${id}/ignore`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showToast('Request ignored', 'success');
                    await loadRequests();
                }
            } catch (e) { console.error(e); }
        }

        async function loadConversations() {
            try {
                const res = await fetch(`${API_BASE}/messages/conversations`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const data = await res.json();
                    const list = document.getElementById('conversationsList');
                    if (data.conversations.length > 0) {
                        list.innerHTML = data.conversations.map(c => {
                            const isUnread = c.unread_count > 0;
                            const isActive = c.partner_id === currentChatUserId;
                            return `
                                <div class="convo-item p-4 flex items-center gap-3 cursor-pointer hover:bg-slate-50 transition-colors ${isActive ? 'active' : ''}" onclick="openChat('${c.partner_id}', '${c.partner_first_name} ${c.partner_last_name}', '${c.partner_avatar || c.partner_profile_pic || 'https://via.placeholder.com/40'}')">
                                    <div class="relative">
                                        <img src="${c.partner_avatar || c.partner_profile_pic || 'https://via.placeholder.com/40'}" class="w-12 h-12 rounded-full object-cover">
                                        ${isUnread ? '<span class="absolute top-0 right-0 w-3 h-3 bg-blue-500 border-2 border-white rounded-full"></span>' : ''}
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="flex justify-between items-baseline mb-0.5">
                                            <h4 class="font-bold text-sm text-slate-900 truncate ${isUnread ? 'text-blue-700' : ''}">${c.partner_first_name} ${c.partner_last_name}</h4>
                                            <span class="text-[10px] text-slate-400 shrink-0 ml-2">${new Date(c.last_message_time).toLocaleDateString()}</span>
                                        </div>
                                        <p class="text-xs truncate ${isUnread ? 'font-semibold text-slate-800' : 'text-slate-500'}">${c.last_message}</p>
                                    </div>
                                </div>
                            `;
                        }).join('');
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function openChat(userId, name, avatar) {
            currentChatUserId = userId;
            document.getElementById('noChatState').classList.add('hidden');
            document.getElementById('activeChatHeader').classList.remove('hidden');
            document.getElementById('chatMessages').classList.remove('hidden');
            document.getElementById('chatInputArea').classList.remove('hidden');

            if (name) document.getElementById('chatName').textContent = name;
            if (avatar) document.getElementById('chatAvatar').src = avatar;

            // Highlight active in sidebar
            loadConversations();

            // Fetch chat history
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.innerHTML = '<div class="flex justify-center p-4"><span class="material-symbols-outlined animate-spin text-slate-400">progress_activity</span></div>';

            try {
                const res = await fetch(`${API_BASE}/messages/${userId}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const data = await res.json();

                    // If we didn't have name/avatar, fetch user info
                    if (!name) {
                        const uRes = await fetch(`${API_BASE}/users/${userId}`, { headers: { 'Authorization': `Bearer ${token}` } });
                        if (uRes.ok) {
                            const uData = await uRes.json();
                            document.getElementById('chatName').textContent = `${uData.user.first_name} ${uData.user.last_name}`;
                            document.getElementById('chatAvatar').src = uData.user.avatar_url || uData.user.profile_pic_url || 'https://via.placeholder.com/40';
                        }
                    }

                    messagesContainer.innerHTML = '';
                    if (data.messages.length === 0) {
                        messagesContainer.innerHTML = `
                            <div class="h-full flex flex-col items-center justify-center opacity-50">
                                <span class="material-symbols-outlined text-4xl mb-2">waving_hand</span>
                                <p class="text-sm">Say hello!</p>
                            </div>
                        `;
                    } else {
                        data.messages.forEach(msg => {
                            const isMe = msg.sender_id === currentUser.id;
                            appendMessage(msg, isMe);
                        });
                        scrollToBottom();
                    }
                }
            } catch (e) { console.error(e); }
        }

        function appendMessage(msg, isMe) {
            const container = document.getElementById('chatMessages');

            // Remove empty state if present
            if (container.innerHTML.includes('Say hello!')) container.innerHTML = '';

            const div = document.createElement('div');
            div.className = `msg-bubble ${isMe ? 'msg-sent' : 'msg-received'}`;
            div.innerHTML = `
                <p>${msg.content}</p>
                <span class="text-[10px] opacity-70 mt-1 block text-right">${new Date(msg.created_at || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
            `;
            container.appendChild(div);
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chatForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !currentChatUserId || !socket) return;

            socket.emit('send_message', {
                receiver_id: currentChatUserId,
                content: content
            });

            input.value = '';
        });

        // User Search Logic
        const searchInput = document.getElementById('userSearchInput');
        const searchResults = document.getElementById('userSearchResults');
        let searchTimeout = null;

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            if (searchTimeout) clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                searchResults.innerHTML = '';
                searchResults.classList.add('hidden');
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`${API_BASE}/users/search/all?q=${encodeURIComponent(query)}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        renderSearchResults(data.users);
                    }
                } catch(err) { console.error(err); }
            }, 300);
        });

        // Hide search when clicking outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.add('hidden');
            }
        });

        function renderSearchResults(users) {
            if (!users || users.length === 0) {
                searchResults.innerHTML = '<div class="p-3 text-sm text-slate-500 text-center">No users found</div>';
                searchResults.classList.remove('hidden');
                return;
            }
            
            searchResults.innerHTML = users.map(user => `
                <div class="flex items-center justify-between p-3 hover:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-3">
                        <img src="${user.profile_pic_url || `https://ui-avatars.com/api/?name=${user.first_name}+${user.last_name}&background=f1f5f9`}" class="w-8 h-8 rounded-full object-cover">
                        <div>
                            <p class="text-sm font-bold text-slate-800 leading-tight">${user.first_name} ${user.last_name}</p>
                            <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">${user.role}</p>
                        </div>
                    </div>
                    <button onclick="sendSearchChatRequest('${user.id}')" class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white flex items-center justify-center transition-all shadow-sm" title="Send Request">
                        <span class="material-symbols-outlined text-[16px]">chat_add_on</span>
                    </button>
                </div>
            `).join('');
            searchResults.classList.remove('hidden');
        }

        async function sendSearchChatRequest(receiverId) {
            try {
                const res = await fetch(`${API_BASE}/chat/request`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ receiver_id: receiverId })
                });
                
                const data = await res.json();
                if (res.ok) {
                    showToast('Chat request sent successfully!', 'success');
                    searchResults.classList.add('hidden');
                    searchInput.value = '';
                } else {
                    showToast(data.error || 'Failed to send request', 'error');
                }
            } catch(e) {
                showToast('Error sending request', 'error');
                console.error(e);
            }
        }

        init();
    </script>
    <script src="../scripts/notifications.js"></script>
</body>

</html>
